global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # Prometheus selbst

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Kong Gateway mit echten Metriken

  - job_name: 'kong'
    static_configs:
      - targets: ['kong_gateway:8001']
    metrics_path: '/metrics'

  # cAdvisor : Container Metriken für ALLE Services

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']