global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Container Metrics von cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Kong Gateway Metrics
  - job_name: 'kong'
    static_configs:
      - targets: ['kong_gateway:8001']
    metrics_path: '/metrics'

  # Prometheus selbst
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']