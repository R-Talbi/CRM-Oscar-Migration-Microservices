
# CI/CD Pipeline Build, Test, Coverage
# Läuft bei jedem Push und Pull Request
# noch in der bearbeitung !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!

name: Build, Test, Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

    # Docker Images bauen
  build:
    name: "Build Docker Images"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build All Services
        run: |
              docker compose build offers
              docker compose build basket
              docker compose build orders
              docker compose build payment


  # Tests: Offers Microservice

  test-offers:
    name: "Test Offers Service"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Start Service
        run: |
          docker compose up -d offers
          sleep 15

      - name: Run Unit Tests Offers
        run: |
          docker compose exec -T offers pytest tests/unit/ -v --tb=short

      - name: Run Integration Tests Offers
        run: |
          docker compose exec -T offers pytest tests/integration/ -v --tb=short

      - name: Check Coverage (>80%)
        run: |
          docker compose exec -T offers pytest tests/ --cov=offers --cov-report=term --cov-fail-under=80

      - name: Stop Offers Service
        if: always()
        run: docker compose down


  # Tests: Basket Microservice

  test-basket:
    name: "Test Basket Service"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Start Basket Service
        run: |
          docker compose up -d basket
          sleep 15

      - name: Run Unit Tests Basket
        run: |
          docker compose exec -T basket pytest tests/unit/ -v --tb=short

      - name: Run Integration Tests
        run: |
          docker compose exec -T basket pytest tests/integration/ -v --tb=short

      - name: Check Coverage (>80%)
        run: |
          docker compose exec -T basket pytest tests/ --cov=basket --cov-report=term --cov-fail-under=80

      - name: Stop Basket Service
        if: always()
        run: docker compose down


  # Tests: Orders Service

  test-orders:
    name: "Test Orders Service"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Start Orders Service
        run: |
          docker compose up -d orders
          sleep 15

      - name: Run Unit Tests Orders
        run: |
          docker compose exec -T orders pytest tests/unit/ -v --tb=short

      - name: Run Integration Tests Orders
        run: |
          docker compose exec -T orders pytest tests/integration/ -v --tb=short

      - name: Check Coverage (>80%)
        run: |
          docker compose exec -T orders pytest tests/ --cov=orders --cov-report=term --cov-fail-under=80

      - name: Stop Orders Service
        if: always()
        run: docker compose down


  # Tests: Payment Service
  test-payment:
    name: "Test Payment Service"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Start Payment Service
        run: |
          docker compose up -d payment
          sleep 15

      - name: Run Unit Tests Payment
        run: |
          docker compose exec -T payment pytest tests/unit/ -v --tb=short

      - name: Run Integration Tests Payment
        run: |
          docker compose exec -T payment pytest tests/integration/ -v --tb=short

      - name: Check Coverage (>80%)
        run: |
          docker compose exec -T payment pytest tests/ --cov=payment --cov-report=term --cov-fail-under=80

      - name: Stop Payment Service
        if: always()
        run: docker compose down


  # Alle Tests erfolgreich
  summary:
    name: "Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [test-offers, test-basket, test-orders, test-payment]
    if: always()

    steps:
      - name: Check Results
        run: |
          echo "Pipeline komplett für 4 Microservice"
          echo "Total: ~158 tests executed"