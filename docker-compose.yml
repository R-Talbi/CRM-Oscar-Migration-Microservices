
version: '3.8'
services:

                                                       # Kong Gateway
  kong-database:
    image: postgres:15-alpine
    container_name: kong_database
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong
    volumes:
      - kong_data:/var/lib/postgresql/data
    networks:
      - microservices_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 5s
      timeout: 5s
      retries: 5

  kong-migration:
    image: kong:3.4
    container_name: kong_migration
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
    networks:
      - microservices_network
    depends_on:
      kong-database:
        condition: service_healthy
    restart: on-failure

  kong:
    image: kong:3.4
    container_name: kong_gateway
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:80
    ports:
      - "80:80"
      - "8444:8001"
    networks:
      - microservices_network
    depends_on:
      kong-database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10


                                                          # Oscar Monolith
  oscar-monolith-db:
    image: postgres:15-alpine
    container_name: oscar_monolith_db
    environment:
      POSTGRES_DB: oscar_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - oscar_monolith_data:/var/lib/postgresql/data
    networks:
      - microservices_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  oscar-monolith:
    build: ./oscar-monolith
    container_name: oscar_monolith
    working_dir: /app/sandbox
    command: >
      sh -c "sleep 10 &&
             python manage.py migrate --noinput &&
             python manage.py createsuperuser
               --noinput
               --username admin
               --email admin@example.com || true &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
          - ../django-oscar:/app
    ports:
      - "8000:8000"
    environment:
        - PYTHONUNBUFFERED=1
        - DB_HOST=oscar-monolith-db
        - DB_NAME=oscar_db
        - DB_USER=postgres
        - DB_PASSWORD=postgres
    networks:
      - microservices_network
    depends_on:
      oscar-monolith-db:
        condition: service_healthy

                                                                            # Offers Microservice
  offers-db:
    image: postgres:15-alpine
    container_name: offers_db
    environment:
      POSTGRES_DB: offers_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - offers_data:/var/lib/postgresql/data
    networks:
      - microservices_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  offers:
    build: ./offers-microservice
    container_name: offers_microservice
    command: >
      sh -c "sleep 10 &&
             python manage.py makemigrations offer &&
             python manage.py migrate --noinput &&
             python manage.py createsuperuser
               --noinput
               --username admin
               --email admin@example.com || true &&
             python manage.py runserver 0.0.0.0:8001"
    volumes:
      - ./offers-microservice:/app
    ports:
      - "8001:8001"
    environment:
      - DJANGO_SUPERUSER_PASSWORD=admin
      - DB_HOST=offers-db
    networks:
      - microservices_network
    depends_on:
      offers-db:
        condition: service_healthy

